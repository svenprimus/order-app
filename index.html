<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Order App</title>
        <link rel="icon" type="image/x-icon" href="./assets/icons/favicon.svg" />

        <link rel="stylesheet" href="./styles/variables.css" />
        <link rel="stylesheet" href="./styles/fonts.css" />
        <link rel="stylesheet" href="./styles/standard.css" />
        <link rel="stylesheet" href="./styles/assets.css" />
        <link rel="stylesheet" href="./styles/animations.css" />

        <link rel="stylesheet" href="./styles/shell.css" />
        <link rel="stylesheet" href="./styles/basket.css" />
        <link rel="stylesheet" href="./style.css" />

        <script src="./scripts/db.js"></script>
        <script src="./scripts/templates.js"></script>
        <script src="./script.js" defer></script>
    </head>
    <body id="body" onload="init()">
        <header id="page_top" class="header_main">
            <a href="#page_top" aria-label="go to top of page">
                <div>
                    <img src="./assets/icons/logo-02.svg" alt="website logo" />
                </div>
            </a>
            <nav id="nav_bar" class="nav_desk_invisible">
                <ul>
                    <li>
                        <a href="#page_top" aria-label="go to top of page">
                            <button class="button_home"></button>
                        </a>
                    </li>
                    <li>
                        <button class="button_profile"></button>
                    </li>
                    <li>
                        <button class="button_orders"></button>
                    </li>
                    <li class="button_basket_wrapper">
                        <button class="button_basket" onclick="toggleBasket()"></button>
                        <div id="button_basket_overlay" class="button_basket_overlay d_none" onclick="toggleBasket()">
                            <p id="button_basket_counter"></p>
                        </div>
                    </li>
                </ul>
                <button class="button_menu" onclick="toggleMenu()">
                    <img src="./assets/icons/menu-button.svg" alt="menu-button" />
                </button>
            </nav>
        </header>
        <section class="hero" aria-label="landing image of page">
            <div class="hero_img_wrapper">
                <img class="hero_img" src="./assets/img/hero.jpg" alt="title image with various foods" />
                <img class="hero_logo" src="./assets/img/loco.png" alt="burger comic picture" />
            </div>
            <div class="rating_stats_wrapper">
                <div class="rating_stats">
                    <button id="button_star" class="button_star_liked" onclick="toggleLike()"></button>
                    <p class="rating">4.1</p>
                    <p class="rating_counter">(<span id="rating_counter">317</span>)</p>
                </div>
                <h1>Don <span>Fuego</span></h1>
            </div>
            <p>
                ¡Órale, amigo!<br />At Don Fuego, we serve the finest pizzas, burgers, and salads with a fiery Mexican
                twist. Come hungry, leave shouting:<br />¡Ay, qué rico!
            </p>
        </section>

        <main class="content_main">
            <nav class="content_main_nav">
                <ul id="content_main_nav_list" class="move_out_categories"></ul>
                <button class="button_categories" onclick="toggleCategoryNavView()">
                    <img src="./assets/icons/filter.svg" alt="filter icon" />
                </button>
            </nav>
            <section class="content_main_content">
                <section id="content_wrapper" class="content_wrapper"></section>
                <section id="basket_wrapper" class="basket_wrapper move_out_basket">
                    <div class="basket">
                        <h2>Your Basket</h2>
                        <ul id="basket_list" class="basket_list"></ul>
                        <div class="payment_table_wrapper">
                            <table class="payment_table">
                                <tr>
                                    <td>Subtotal</td>
                                    <td id="payment_table_subtotal"></td>
                                </tr>
                                <tr>
                                    <td>Delivery Fee</td>
                                    <td id="payment_table_delivery"></td>
                                </tr>
                            </table>
                            <hr />
                            <table class="payment_total">
                                <tr>
                                    <th>Total</th>
                                    <th id="payment_table_total"></th>
                                </tr>
                            </table>
                        </div>
                        <button class="button_buy" onlick="completeOrder()"><p>Buy now</p><p id="button_buy"></p></button>
                        <!-- <p>
                        Nothing here yet.<br />
                        Go ahead and choose something delicious!
                    </p>
                    <img src="./assets/icons/basket-empty-overlay.svg" alt="empty basket"> -->
                    </div>
                </section>
            </section>
        </main>

        <footer>
            <div>
                <a href="https://de.wikipedia.org/wiki/Drucker_(Ger%C3%A4t)" target="_blank">Imprint</a>
                <a href="https://www.chefkoch.de/rs/s0/cookies/Rezepte.html" target="_blank">Cookie Preferences</a>
                <div>
                    <img src="./assets/icons/copyright.svg" alt="copyright icon" />
                    <p>2026 Don Fuego</p>
                </div>
            </div>
        </footer>
    </body>
</html>
